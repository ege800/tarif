<!doctype html>
<html lang="tr" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Tarif Defteri</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&amp;family=DM+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    .recipe-card { transition: transform 0.2s, box-shadow 0.2s; }
    .recipe-card:hover { transform: translateY(-3px); }
    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .modal-overlay { animation: overlayIn 0.2s ease; }
    @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
    textarea, input, select { font-family: 'DM Sans', sans-serif; }
  </style>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background-color: #faf7f2; font-family: 'DM Sans', sans-serif;"><!-- Header -->
   <header class="relative overflow-hidden" style="background: linear-gradient(135deg, #2d2016 0%, #5c3d2e 100%);">
    <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(circle at 20% 50%, #f5e6d3 1px, transparent 1px), radial-gradient(circle at 80% 20%, #f5e6d3 1px, transparent 1px); background-size: 60px 60px;"></div>
    <div class="relative max-w-5xl mx-auto px-6 py-10 text-center">
     <h1 id="el-title" class="text-4xl md:text-5xl font-bold mb-2" style="font-family: 'Playfair Display', serif; color: #f5e6d3;">Tarif Defterim</h1>
     <p id="el-subtitle" class="text-lg opacity-80" style="color: #f5e6d3;">Lezzetli tariflerinizi kaydedin</p>
    </div>
   </header><!-- Controls -->
   <div class="max-w-5xl mx-auto px-6 pt-6 flex flex-wrap gap-3 items-center justify-between">
    <div class="flex gap-2 flex-wrap" id="filter-buttons"><button onclick="setFilter('all')" class="filter-btn px-4 py-2 rounded-full text-sm font-medium transition-colors" style="background:#5c3d2e; color:#f5e6d3;">Tümü</button> <button onclick="setFilter('Ana Yemek')" class="filter-btn px-4 py-2 rounded-full text-sm font-medium transition-colors" style="background:#e8ddd0; color:#5c3d2e;">Ana Yemek</button> <button onclick="setFilter('Çorba')" class="filter-btn px-4 py-2 rounded-full text-sm font-medium transition-colors" style="background:#e8ddd0; color:#5c3d2e;">Çorba</button> <button onclick="setFilter('Tatlı')" class="filter-btn px-4 py-2 rounded-full text-sm font-medium transition-colors" style="background:#e8ddd0; color:#5c3d2e;">Tatlı</button> <button onclick="setFilter('Salata')" class="filter-btn px-4 py-2 rounded-full text-sm font-medium transition-colors" style="background:#e8ddd0; color:#5c3d2e;">Salata</button> <button onclick="setFilter('Diğer')" class="filter-btn px-4 py-2 rounded-full text-sm font-medium transition-colors" style="background:#e8ddd0; color:#5c3d2e;">Diğer</button>
    </div><button onclick="openAddModal()" class="flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-semibold transition-colors" style="background:#c0593a; color:#fff;"> <i data-lucide="plus" style="width:18px;height:18px;"></i> Yeni Tarif </button>
   </div><!-- Recipe Grid -->
   <div id="recipe-grid" class="max-w-5xl mx-auto px-6 py-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
   </div><!-- Empty State -->
   <div id="empty-state" class="max-w-5xl mx-auto px-6 py-16 text-center hidden">
    <div class="text-6xl mb-4">
     📖
    </div>
    <p class="text-xl font-semibold" style="color:#5c3d2e;">Henüz tarif eklenmemiş</p>
    <p class="mt-2 opacity-60" style="color:#5c3d2e;">"Yeni Tarif" butonuna tıklayarak başlayın</p>
   </div><!-- Toast -->
   <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-3 rounded-xl text-sm font-medium shadow-lg transition-all duration-300 opacity-0 pointer-events-none" style="background:#2d2016; color:#f5e6d3; z-index:100;"></div><!-- Add/Edit Modal -->
   <div id="modal" class="fixed inset-0 hidden" style="z-index:50;">
    <div class="absolute inset-0 bg-black/50 modal-overlay" onclick="closeModal()"></div>
    <div class="relative mx-auto mt-8 max-w-lg w-full mx-4 rounded-2xl shadow-2xl max-h-[90%] overflow-auto fade-in" style="background:#fff;">
     <div class="flex items-center justify-between p-5 border-b" style="border-color:#e8ddd0;">
      <h2 id="modal-title" class="text-xl font-bold" style="font-family:'Playfair Display',serif; color:#2d2016;">Yeni Tarif Ekle</h2><button onclick="closeModal()" class="p-1 rounded-lg hover:bg-gray-100"><i data-lucide="x" style="width:20px;height:20px;color:#5c3d2e;"></i></button>
     </div>
     <form id="recipe-form" class="p-5 space-y-4" onsubmit="handleSubmit(event)">
      <div><label for="f-name" class="block text-sm font-medium mb-1" style="color:#5c3d2e;">Tarif Adı *</label> <input id="f-name" required class="w-full px-3 py-2.5 rounded-lg border text-sm" style="border-color:#e8ddd0;" placeholder="Örn: Karnıyarık">
      </div>
      <div class="grid grid-cols-3 gap-3">
       <div><label for="f-category" class="block text-sm font-medium mb-1" style="color:#5c3d2e;">Kategori</label> <select id="f-category" class="w-full px-3 py-2.5 rounded-lg border text-sm" style="border-color:#e8ddd0;"> <option>Ana Yemek</option><option>Çorba</option><option>Tatlı</option><option>Salata</option><option>Diğer</option> </select>
       </div>
       <div><label for="f-time" class="block text-sm font-medium mb-1" style="color:#5c3d2e;">Süre</label> <input id="f-time" class="w-full px-3 py-2.5 rounded-lg border text-sm" style="border-color:#e8ddd0;" placeholder="45 dk">
       </div>
       <div><label for="f-servings" class="block text-sm font-medium mb-1" style="color:#5c3d2e;">Porsiyon</label> <input id="f-servings" class="w-full px-3 py-2.5 rounded-lg border text-sm" style="border-color:#e8ddd0;" placeholder="4 kişi">
       </div>
      </div>
      <div><label for="f-ingredients" class="block text-sm font-medium mb-1" style="color:#5c3d2e;">Malzemeler *</label> <textarea id="f-ingredients" required rows="4" class="w-full px-3 py-2.5 rounded-lg border text-sm" style="border-color:#e8ddd0;" placeholder="Her satıra bir malzeme yazın"></textarea>
      </div>
      <div><label for="f-instructions" class="block text-sm font-medium mb-1" style="color:#5c3d2e;">Yapılışı *</label> <textarea id="f-instructions" required rows="4" class="w-full px-3 py-2.5 rounded-lg border text-sm" style="border-color:#e8ddd0;" placeholder="Adım adım tarifi yazın"></textarea>
      </div><button type="submit" id="submit-btn" class="w-full py-3 rounded-xl font-semibold text-sm transition-colors" style="background:#c0593a; color:#fff;"> Tarifi Kaydet </button>
     </form>
    </div>
   </div><!-- Detail Modal -->
   <div id="detail-modal" class="fixed inset-0 hidden" style="z-index:50;">
    <div class="absolute inset-0 bg-black/50 modal-overlay" onclick="closeDetail()"></div>
    <div class="relative mx-auto mt-8 max-w-lg w-full mx-4 rounded-2xl shadow-2xl max-h-[90%] overflow-auto fade-in" style="background:#fff;">
     <div id="detail-content" class="p-6"></div>
    </div>
   </div><!-- Delete Confirm -->
   <div id="delete-confirm" class="fixed inset-0 hidden" style="z-index:60;">
    <div class="absolute inset-0 bg-black/50 modal-overlay"></div>
    <div class="relative mx-auto mt-32 max-w-sm w-full mx-4 rounded-2xl shadow-2xl p-6 text-center fade-in" style="background:#fff;">
     <div class="text-4xl mb-3">
      🗑️
     </div>
     <p class="font-semibold text-lg mb-1" style="color:#2d2016;">Tarifi silmek istediğinize emin misiniz?</p>
     <p class="text-sm mb-5 opacity-60" style="color:#5c3d2e;">Bu işlem geri alınamaz.</p>
     <div class="flex gap-3"><button onclick="cancelDelete()" class="flex-1 py-2.5 rounded-xl font-medium text-sm" style="background:#e8ddd0; color:#5c3d2e;">Vazgeç</button> <button onclick="confirmDelete()" id="delete-btn" class="flex-1 py-2.5 rounded-xl font-medium text-sm" style="background:#c0593a; color:#fff;">Sil</button>
     </div>
    </div>
   </div>
  </div>
  <script>
  const categoryEmojis = { 'Ana Yemek': '🍖', 'Çorba': '🍲', 'Tatlı': '🍰', 'Salata': '🥗', 'Diğer': '🍽️' };
  let allRecipes = [];
  let currentFilter = 'all';
  let editingRecipe = null;
  let deletingRecipe = null;

  const defaultConfig = {
    app_title: 'Tarif Defterim',
    subtitle_text: 'Lezzetli tariflerinizi kaydedin',
    background_color: '#faf7f2',
    surface_color: '#ffffff',
    text_color: '#2d2016',
    primary_color: '#c0593a',
    secondary_color: '#5c3d2e',
    font_family: 'Playfair Display',
    font_size: 16
  };

  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => {
      const c = { ...defaultConfig, ...config };
      document.getElementById('app').style.backgroundColor = c.background_color;
      document.getElementById('el-title').textContent = c.app_title;
      document.getElementById('el-title').style.fontFamily = `${c.font_family}, Playfair Display, serif`;
      document.getElementById('el-subtitle').textContent = c.subtitle_text;

      // Apply colors
      document.querySelectorAll('.recipe-card').forEach(card => {
        card.style.backgroundColor = c.surface_color;
        card.querySelector('.card-title').style.color = c.text_color;
      });
      document.querySelectorAll('.filter-btn').forEach(btn => {
        if (btn.dataset.active === 'true') {
          btn.style.backgroundColor = c.secondary_color;
        }
      });
      const addBtn = document.querySelector('[onclick="openAddModal()"]');
      if (addBtn) addBtn.style.backgroundColor = c.primary_color;
      document.getElementById('submit-btn').style.backgroundColor = c.primary_color;
    },
    mapToCapabilities: (config) => {
      const c = { ...defaultConfig, ...config };
      const makeColor = (key) => ({
        get: () => c[key] || defaultConfig[key],
        set: (v) => { c[key] = v; window.elementSdk.setConfig({ [key]: v }); }
      });
      return {
        recolorables: [
          makeColor('background_color'),
          makeColor('surface_color'),
          makeColor('text_color'),
          makeColor('primary_color'),
          makeColor('secondary_color')
        ],
        borderables: [],
        fontEditable: {
          get: () => c.font_family || defaultConfig.font_family,
          set: (v) => { c.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
        },
        fontSizeable: {
          get: () => c.font_size || defaultConfig.font_size,
          set: (v) => { c.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
        }
      };
    },
    mapToEditPanelValues: (config) => {
      const c = { ...defaultConfig, ...config };
      return new Map([
        ['app_title', c.app_title],
        ['subtitle_text', c.subtitle_text]
      ]);
    }
  });

  // Data SDK
  const dataHandler = {
    onDataChanged(data) {
      allRecipes = data;
      renderRecipes();
    }
  };
  (async () => {
    const r = await window.dataSdk.init(dataHandler);
    if (!r.isOk) console.error('Data SDK init failed');
  })();

  function renderRecipes() {
    const grid = document.getElementById('recipe-grid');
    const empty = document.getElementById('empty-state');
    const filtered = currentFilter === 'all' ? allRecipes : allRecipes.filter(r => r.category === currentFilter);

    if (filtered.length === 0) {
      grid.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    const existing = new Map([...grid.children].map(el => [el.dataset.id, el]));
    const newIds = new Set(filtered.map(r => r.__backendId));

    existing.forEach((el, id) => { if (!newIds.has(id)) el.remove(); });

    filtered.forEach(recipe => {
      const id = recipe.__backendId;
      if (existing.has(id)) {
        updateCard(existing.get(id), recipe);
      } else {
        grid.appendChild(createCard(recipe));
      }
    });
  }

  function createCard(r) {
    const div = document.createElement('div');
    div.className = 'recipe-card rounded-2xl p-5 cursor-pointer shadow-sm fade-in';
    div.style.backgroundColor = '#fff';
    div.dataset.id = r.__backendId;
    div.onclick = () => openDetail(r.__backendId);
    updateCardInner(div, r);
    return div;
  }

  function updateCard(div, r) {
    div.onclick = () => openDetail(r.__backendId);
    updateCardInner(div, r);
  }

  function updateCardInner(div, r) {
    const emoji = categoryEmojis[r.category] || '🍽️';
    div.innerHTML = `
      <div class="flex items-start justify-between mb-3">
        <span class="text-3xl">${emoji}</span>
        <span class="text-xs font-medium px-2.5 py-1 rounded-full" style="background:#e8ddd0; color:#5c3d2e;">${r.category || 'Diğer'}</span>
      </div>
      <h3 class="card-title font-bold text-lg mb-2" style="font-family:'Playfair Display',serif; color:#2d2016;">${esc(r.name)}</h3>
      <div class="flex gap-3 text-xs opacity-60" style="color:#5c3d2e;">
        ${r.prep_time ? `<span>⏱ ${esc(r.prep_time)}</span>` : ''}
        ${r.servings ? `<span>👥 ${esc(r.servings)}</span>` : ''}
      </div>
    `;
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(btn => {
      const isActive = (f === 'all' && btn.textContent === 'Tümü') || btn.textContent === f;
      btn.style.backgroundColor = isActive ? '#5c3d2e' : '#e8ddd0';
      btn.style.color = isActive ? '#f5e6d3' : '#5c3d2e';
      btn.dataset.active = isActive;
    });
    renderRecipes();
  }

  function openAddModal() {
    editingRecipe = null;
    document.getElementById('modal-title').textContent = 'Yeni Tarif Ekle';
    document.getElementById('submit-btn').textContent = 'Tarifi Kaydet';
    document.getElementById('recipe-form').reset();
    document.getElementById('modal').classList.remove('hidden');
  }

  function openEditModal(id) {
    const r = allRecipes.find(x => x.__backendId === id);
    if (!r) return;
    editingRecipe = r;
    document.getElementById('modal-title').textContent = 'Tarifi Düzenle';
    document.getElementById('submit-btn').textContent = 'Güncelle';
    document.getElementById('f-name').value = r.name || '';
    document.getElementById('f-category').value = r.category || 'Ana Yemek';
    document.getElementById('f-time').value = r.prep_time || '';
    document.getElementById('f-servings').value = r.servings || '';
    document.getElementById('f-ingredients').value = r.ingredients || '';
    document.getElementById('f-instructions').value = r.instructions || '';
    closeDetail();
    document.getElementById('modal').classList.remove('hidden');
  }

  function closeModal() { document.getElementById('modal').classList.remove('hidden'); document.getElementById('modal').classList.add('hidden'); }

  async function handleSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Kaydediliyor...';

    const data = {
      name: document.getElementById('f-name').value.trim(),
      category: document.getElementById('f-category').value,
      prep_time: document.getElementById('f-time').value.trim(),
      servings: document.getElementById('f-servings').value.trim(),
      ingredients: document.getElementById('f-ingredients').value.trim(),
      instructions: document.getElementById('f-instructions').value.trim(),
      created_at: new Date().toISOString()
    };

    let result;
    if (editingRecipe) {
      result = await window.dataSdk.update({ ...editingRecipe, ...data });
    } else {
      if (allRecipes.length >= 999) {
        showToast('⚠️ Maksimum 999 tarif sınırına ulaşıldı!');
        btn.disabled = false; btn.textContent = 'Tarifi Kaydet';
        return;
      }
      result = await window.dataSdk.create(data);
    }

    btn.disabled = false;
    btn.textContent = editingRecipe ? 'Güncelle' : 'Tarifi Kaydet';

    if (result.isOk) {
      showToast(editingRecipe ? '✅ Tarif güncellendi!' : '✅ Tarif eklendi!');
      closeModal();
    } else {
      showToast('❌ Bir hata oluştu, tekrar deneyin.');
    }
  }

  function openDetail(id) {
    const r = allRecipes.find(x => x.__backendId === id);
    if (!r) return;
    const emoji = categoryEmojis[r.category] || '🍽️';
    document.getElementById('detail-content').innerHTML = `
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <span class="text-4xl">${emoji}</span>
          <div>
            <h2 class="text-2xl font-bold" style="font-family:'Playfair Display',serif; color:#2d2016;">${esc(r.name)}</h2>
            <span class="text-xs font-medium px-2.5 py-1 rounded-full" style="background:#e8ddd0; color:#5c3d2e;">${r.category}</span>
          </div>
        </div>
        <button onclick="closeDetail()" class="p-1 rounded-lg hover:bg-gray-100"><i data-lucide="x" style="width:20px;height:20px;color:#5c3d2e;"></i></button>
      </div>
      <div class="flex gap-4 mb-5 text-sm" style="color:#5c3d2e;">
        ${r.prep_time ? `<span>⏱ ${esc(r.prep_time)}</span>` : ''}
        ${r.servings ? `<span>👥 ${esc(r.servings)}</span>` : ''}
      </div>
      <div class="mb-5">
        <h3 class="font-bold text-sm mb-2" style="color:#5c3d2e;">📝 Malzemeler</h3>
        <div class="rounded-xl p-4 text-sm whitespace-pre-line" style="background:#faf7f2; color:#2d2016;">${esc(r.ingredients)}</div>
      </div>
      <div class="mb-5">
        <h3 class="font-bold text-sm mb-2" style="color:#5c3d2e;">👩‍🍳 Yapılışı</h3>
        <div class="rounded-xl p-4 text-sm whitespace-pre-line" style="background:#faf7f2; color:#2d2016;">${esc(r.instructions)}</div>
      </div>
      <div class="flex gap-3">
        <button onclick="openEditModal('${r.__backendId}')" class="flex-1 py-2.5 rounded-xl font-medium text-sm flex items-center justify-center gap-2" style="background:#e8ddd0; color:#5c3d2e;">
          <i data-lucide="edit" style="width:16px;height:16px;"></i> Düzenle
        </button>
        <button onclick="askDelete('${r.__backendId}')" class="flex-1 py-2.5 rounded-xl font-medium text-sm flex items-center justify-center gap-2" style="background:#c0593a; color:#fff;">
          <i data-lucide="trash-2" style="width:16px;height:16px;"></i> Sil
        </button>
      </div>
    `;
    document.getElementById('detail-modal').classList.remove('hidden');
    lucide.createIcons();
  }

  function closeDetail() { document.getElementById('detail-modal').classList.add('hidden'); }

  function askDelete(id) {
    deletingRecipe = allRecipes.find(x => x.__backendId === id);
    document.getElementById('delete-confirm').classList.remove('hidden');
  }
  function cancelDelete() { deletingRecipe = null; document.getElementById('delete-confirm').classList.add('hidden'); }
  async function confirmDelete() {
    if (!deletingRecipe) return;
    const btn = document.getElementById('delete-btn');
    btn.disabled = true; btn.textContent = 'Siliniyor...';
    const result = await window.dataSdk.delete(deletingRecipe);
    btn.disabled = false; btn.textContent = 'Sil';
    document.getElementById('delete-confirm').classList.add('hidden');
    closeDetail();
    showToast(result.isOk ? '🗑️ Tarif silindi.' : '❌ Silinemedi, tekrar deneyin.');
    deletingRecipe = null;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.opacity = '1';
    setTimeout(() => { t.style.opacity = '0'; }, 2500);
  }

  lucide.createIcons();
</script>

</html>
