<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lezzet Defterim</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel (CDN bağlantıları) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            margin: 0;
        }
        .recipe-card { 
            transition: all 0.3s ease; 
            cursor: pointer; 
        }
        .recipe-card:hover { 
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        /* Kodun ham metin olarak görünmesini engellemek için */
        #root:empty {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-weight: bold;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div id="root">Uygulama yükleniyor...</div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const SimpleIcon = ({ type, color = "currentColor" }) => {
            const icons = {
                plus: "＋",
                search: "🔍",
                heart: "❤️",
                clock: "🕒",
                chef: "👨‍🍳",
                back: "⬅️",
                trash: "🗑️",
                book: "📖"
            };
            return <span style={{ color: color }} className="mr-1 inline-block">{icons[type]}</span>;
        };

        const App = () => {
            const [recipes, setRecipes] = useState([
                {
                    id: 1,
                    title: 'Pesto Soslu Tavuklu Makarna',
                    category: 'Ana Yemekler',
                    ingredients: 'Penne makarna, Tavuk göğsü, Krema, Pesto sosu, Zeytinyağı',
                    instructions: '1. Makarnayı tuzlu suda haşlayın.\n2. Tavukları küp küp doğrayıp soteleyin.\n3. Krema ve pesto sosu ekleyip karıştırın.',
                    prepTime: '20 dk',
                    isFavorite: true
                }
            ]);

            const [searchTerm, setSearchTerm] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('Hepsi');
            const [isAddingNew, setIsAddingNew] = useState(false);
            const [viewingRecipe, setViewingRecipe] = useState(null);

            const categories = ['Hepsi', 'Ana Yemekler', 'Tatlılar', 'Hamur İşleri', 'Salatalar'];

            const [newRecipe, setNewRecipe] = useState({
                title: '', category: 'Ana Yemekler', ingredients: '', instructions: '', prepTime: '', isFavorite: false
            });

            const filteredRecipes = useMemo(() => {
                return recipes.filter(r => {
                    const matchesSearch = r.title.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesCat = selectedCategory === 'Hepsi' || r.category === selectedCategory;
                    return matchesSearch && matchesCat;
                });
            }, [recipes, searchTerm, selectedCategory]);

            const saveRecipe = (e) => {
                e.preventDefault();
                if (!newRecipe.title) return;
                setRecipes([{ ...newRecipe, id: Date.now() }, ...recipes]);
                setIsAddingNew(false);
                setNewRecipe({ title: '', category: 'Ana Yemekler', ingredients: '', instructions: '', prepTime: '', isFavorite: false });
            };

            // Detay Görünümü
            if (viewingRecipe) {
                return (
                    <div className="min-h-screen bg-white p-6 max-w-2xl mx-auto border-x border-slate-100">
                        <button onClick={() => setViewingRecipe(null)} className="flex items-center text-orange-500 font-bold mb-8 hover:opacity-75">
                            <SimpleIcon type="back" /> Listeye Dön
                        </button>
                        <div className="mb-2">
                            <span className="text-[10px] font-black text-orange-600 bg-orange-100 px-2 py-1 rounded-md uppercase tracking-widest">{viewingRecipe.category}</span>
                        </div>
                        <h1 className="text-4xl font-black text-slate-900 mb-4">{viewingRecipe.title}</h1>
                        <div className="flex items-center gap-4 text-slate-500 mb-8 pb-4 border-b border-slate-100 font-medium">
                            <div className="flex items-center"><SimpleIcon type="clock" /> {viewingRecipe.prepTime || 'Belirtilmedi'}</div>
                        </div>
                        
                        <div className="space-y-8">
                            <section>
                                <h2 className="text-xl font-black mb-4 flex items-center gap-2"><SimpleIcon type="chef" /> Malzemeler</h2>
                                <div className="bg-slate-50 p-6 rounded-3xl border border-slate-100 text-slate-700 leading-relaxed whitespace-pre-wrap">
                                    {viewingRecipe.ingredients}
                                </div>
                            </section>
                            
                            <section>
                                <h2 className="text-xl font-black mb-4 flex items-center gap-2"><SimpleIcon type="book" /> Hazırlanış</h2>
                                <p className="text-slate-700 leading-relaxed whitespace-pre-wrap text-lg">
                                    {viewingRecipe.instructions}
                                </p>
                            </section>
                        </div>
                    </div>
                );
            }

            // Yeni Tarif Ekleme
            if (isAddingNew) {
                return (
                    <div className="min-h-screen bg-white p-6 max-w-2xl mx-auto border-x border-slate-100">
                        <div className="flex items-center justify-between mb-8">
                            <h1 className="text-2xl font-black text-slate-900">Yeni Tarif Yaz</h1>
                            <button onClick={() => setIsAddingNew(false)} className="text-slate-400 hover:text-slate-600 font-bold">Kapat</button>
                        </div>
                        
                        <form onSubmit={saveRecipe} className="space-y-4">
                            <input className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-orange-500 transition-all font-bold" placeholder="Tarif Başlığı" value={newRecipe.title} onChange={e => setNewRecipe({...newRecipe, title: e.target.value})} autoFocus />
                            
                            <div className="grid grid-cols-2 gap-4">
                                <select className="bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl outline-none font-bold text-slate-500" value={newRecipe.category} onChange={e => setNewRecipe({...newRecipe, category: e.target.value})}>
                                    {categories.filter(c => c !== 'Hepsi').map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                                <input className="bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl outline-none font-bold" placeholder="Süre (örn: 30 dk)" value={newRecipe.prepTime} onChange={e => setNewRecipe({...newRecipe, prepTime: e.target.value})} />
                            </div>

                            <textarea className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-orange-500 transition-all h-32 resize-none" placeholder="Malzemeler (her birini virgül veya yeni satır ile ayırabilirsiniz)" value={newRecipe.ingredients} onChange={e => setNewRecipe({...newRecipe, ingredients: e.target.value})} />
                            
                            <textarea className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-orange-500 transition-all h-48 resize-none" placeholder="Nasıl hazırlanır?" value={newRecipe.instructions} onChange={e => setNewRecipe({...newRecipe, instructions: e.target.value})} />
                            
                            <button type="submit" className="w-full bg-orange-500 text-white p-5 rounded-2xl font-black text-lg shadow-lg shadow-orange-100 hover:bg-orange-600 transition-all transform active:scale-[0.98]">
                                Tarife Ekle
                            </button>
                        </form>
                    </div>
                );
            }

            // Ana Sayfa
            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    <header className="flex justify-between items-center mb-8">
                        <div>
                            <h1 className="text-3xl font-black text-slate-900 tracking-tighter">LEZZET<span className="text-orange-500">DEFTERİM</span></h1>
                            <p className="text-slate-400 text-sm font-bold">Kişisel Yemek Arşiviniz</p>
                        </div>
                        <button onClick={() => setIsAddingNew(true)} className="bg-orange-500 text-white w-14 h-14 rounded-2xl font-black shadow-xl shadow-orange-100 hover:rotate-90 transition-all duration-300 flex items-center justify-center text-2xl">
                            ＋
                        </button>
                    </header>

                    <div className="relative mb-8 group">
                        <div className="absolute left-4 top-1/2 -translate-y-1/2 opacity-30 group-focus-within:opacity-100 transition-opacity">
                            <SimpleIcon type="search" />
                        </div>
                        <input className="w-full p-5 pl-12 rounded-[2rem] bg-white shadow-sm border-2 border-slate-100 outline-none focus:border-orange-200 transition-all" placeholder="Tariflerinde ara..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                    </div>

                    <div className="flex gap-2 overflow-x-auto pb-4 no-scrollbar mb-6">
                        {categories.map(c => (
                            <button key={c} onClick={() => setSelectedCategory(c)} className={`px-6 py-3 rounded-2xl whitespace-nowrap font-black text-sm transition-all ${selectedCategory === c ? 'bg-slate-900 text-white shadow-lg' : 'bg-white text-slate-400 border border-slate-100 hover:bg-slate-50'}`}>{c}</button>
                        ))}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {filteredRecipes.length > 0 ? filteredRecipes.map(r => (
                            <div key={r.id} onClick={() => setViewingRecipe(r)} className="recipe-card bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-50 group">
                                <div className="flex justify-between items-center mb-4">
                                    <span className="text-[10px] font-black text-orange-500 bg-orange-50 px-2 py-1 rounded-md uppercase tracking-widest border border-orange-100">{r.category}</span>
                                    <span className="opacity-0 group-hover:opacity-100 transition-opacity"><SimpleIcon type="heart" /></span>
                                </div>
                                <h3 className="text-2xl font-black text-slate-800 mb-4 group-hover:text-orange-500 transition-colors">{r.title}</h3>
                                <div className="flex justify-between items-center pt-4 border-t border-slate-50 text-slate-400 text-xs font-bold uppercase tracking-tighter">
                                    <span className="flex items-center"><SimpleIcon type="clock" /> {r.prepTime || 'Süre Belirtilmedi'}</span>
                                    <span className="text-orange-500 opacity-80">Tarife Git →</span>
                                </div>
                            </div>
                        )) : (
                            <div className="col-span-full text-center py-20 bg-white rounded-[3rem] border-2 border-dashed border-slate-100">
                                <div className="text-4xl mb-4">🍳</div>
                                <p className="text-slate-400 font-bold">Henüz böyle bir tarif eklememişsin.</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
