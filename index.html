<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lezzet Defterim - ProChef Yerel</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .recipe-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
        }
        .recipe-card:hover { 
            transform: translateY(-6px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .auth-card { 
            animation: slideUp 0.6s ease-out; 
        }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        input, textarea, select {
            border: 2px solid transparent !important;
            transition: all 0.2s ease;
        }
        input:focus, textarea:focus {
            border-color: #f97316 !important;
            background-color: white !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Sabit giriş bilgileri
        const MASTER_USER = "ustachef";
        const MASTER_PASS = "HY0161";

        const SimpleIcon = ({ type, active }) => {
            const icons = {
                plus: "＋", search: "🔍", heart: active ? "❤️" : "🤍", 
                clock: "🕒", chef: "👨‍🍳", back: "⬅️", trash: "🗑️", 
                book: "📖", x: "❌", logout: "🚪", user: "👤", lock: "🔒",
                star: "⭐", list: "📜", link: "🔗", play: "▶️", magic: "✨", edit: "✏️", dot: "•"
            };
            return <span className={`inline-block ${active ? 'scale-110' : ''}`}>{icons[type]}</span>;
        };

        const App = () => {
            // State Tanımlamaları
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [recipes, setRecipes] = useState([]);
            const [loading, setLoading] = useState(true);
            const [nameInput, setNameInput] = useState('');
            const [passInput, setPassInput] = useState('');
            const [error, setError] = useState('');
            
            // Filtreleme State'leri
            const categories = ['Hepsi', 'Ana Yemekler', 'Tatlılar', 'Hamur İşleri', 'Salatalar', 'Çorbalar'];
            const [selectedCategory, setSelectedCategory] = useState('Hepsi');
            const [showFavoritesOnly, setShowFavoritesOnly] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            
            // Görünüm State'leri
            const [isAddingNew, setIsAddingNew] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [viewingRecipe, setViewingRecipe] = useState(null);

            // Form State'leri
            const [formTitle, setFormTitle] = useState('');
            const [formIngredients, setFormIngredients] = useState('');
            const [formInstructions, setFormInstructions] = useState('');
            const [formPrepTime, setFormPrepTime] = useState('');
            const [formCategory, setFormCategory] = useState('Ana Yemekler');

            // VERİTABANI: Uygulama ilk açıldığında yerel hafızadan verileri yükle
            useEffect(() => {
                const savedRecipes = localStorage.getItem('prochef_local_db_v1');
                if (savedRecipes) {
                    try {
                        setRecipes(JSON.parse(savedRecipes));
                    } catch (e) {
                        console.error("Veri yükleme hatası", e);
                    }
                }
                
                const session = localStorage.getItem('prochef_session');
                if (session === 'active') {
                    setIsLoggedIn(true);
                }
                setLoading(false);
            }, []);

            // VERİTABANI: Tarifler her değiştiğinde yerel hafızaya kaydet
            useEffect(() => {
                if (!loading) {
                    localStorage.setItem('prochef_local_db_v1', JSON.stringify(recipes));
                }
            }, [recipes, loading]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (nameInput.toLowerCase() === MASTER_USER && passInput === MASTER_PASS) {
                    setIsLoggedIn(true);
                    localStorage.setItem('prochef_session', 'active');
                } else { 
                    setError('Hatalı bilgiler şefim!'); 
                    setTimeout(() => setError(''), 3000);
                }
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                localStorage.removeItem('prochef_session');
            };

            const saveRecipe = (e) => {
                e.preventDefault();
                const recipeData = {
                    id: isEditing ? editingId : Date.now().toString(),
                    title: formTitle,
                    category: formCategory,
                    prepTime: formPrepTime,
                    ingredients: formIngredients,
                    instructions: formInstructions,
                    isFavorite: isEditing ? (recipes.find(r => r.id === editingId)?.isFavorite || false) : false,
                    createdAt: isEditing ? (recipes.find(r => r.id === editingId)?.createdAt || Date.now()) : Date.now()
                };

                if (isEditing) {
                    setRecipes(recipes.map(r => r.id === editingId ? recipeData : r));
                } else {
                    setRecipes([recipeData, ...recipes]);
                }

                closeModals();
            };

            const toggleFavorite = (e, recipeId) => {
                e.stopPropagation();
                setRecipes(recipes.map(r => 
                    r.id === recipeId ? { ...r, isFavorite: !r.isFavorite } : r
                ));
            };

            const deleteRecipe = (id) => {
                if(confirm("Bu tarifi silmek istediğinize emin misiniz?")) {
                    setRecipes(recipes.filter(r => r.id !== id));
                    setViewingRecipe(null);
                }
            };

            const startEditing = (recipe) => {
                setFormTitle(recipe.title);
                setFormIngredients(recipe.ingredients);
                setFormInstructions(recipe.instructions);
                setFormPrepTime(recipe.prepTime);
                setFormCategory(recipe.category);
                setEditingId(recipe.id);
                setIsEditing(true);
                setViewingRecipe(null);
            };

            const closeModals = () => {
                setIsAddingNew(false);
                setIsEditing(false);
                setViewingRecipe(null);
                resetForm();
            };

            const resetForm = () => {
                setFormTitle(''); setFormIngredients(''); setFormInstructions('');
                setFormPrepTime(''); setFormCategory('Ana Yemekler');
                setEditingId(null);
            };

            const filteredRecipes = useMemo(() => {
                return recipes.filter(r => {
                    const matchesSearch = r.title.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesCat = selectedCategory === 'Hepsi' || r.category === selectedCategory;
                    const matchesFav = !showFavoritesOnly || r.isFavorite;
                    return matchesSearch && matchesCat && matchesFav;
                });
            }, [recipes, searchTerm, selectedCategory, showFavoritesOnly]);

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
                    <div className="text-4xl animate-bounce mb-4"><SimpleIcon type="chef" /></div>
                    <div className="font-black text-slate-400 tracking-widest uppercase text-xs">Mutfak Hazırlanıyor...</div>
                </div>
            );

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50">
                        <div className="bg-white w-full max-w-md rounded-[3rem] p-10 shadow-2xl border border-slate-100 auth-card text-center">
                            <div className="text-4xl mb-4 bg-orange-100 w-20 h-20 flex items-center justify-center rounded-3xl mx-auto"><SimpleIcon type="chef" /></div>
                            <h1 className="text-3xl font-black text-slate-900 italic tracking-tighter mb-2 uppercase">PRO<span className="text-orange-500 not-italic">CHEF</span></h1>
                            <p className="text-slate-400 text-[10px] font-bold tracking-[0.2em] mb-10">YEREL VERİTABANI SÜRÜMÜ</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4 text-left">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-slate-400 ml-4 uppercase tracking-wider">Şef Kodu</label>
                                    <input type="text" placeholder="Kullanıcı Adı" className="w-full bg-slate-50 p-5 rounded-2xl outline-none font-bold" value={nameInput} onChange={e => setNameInput(e.target.value)} />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-slate-400 ml-4 uppercase tracking-wider">Mutfak Anahtarı</label>
                                    <input type="password" placeholder="Şifre" className="w-full bg-slate-50 p-5 rounded-2xl outline-none font-bold" value={passInput} onChange={e => setPassInput(e.target.value)} />
                                </div>
                                {error && <div className="text-red-500 text-[11px] font-black text-center bg-red-50 p-3 rounded-xl uppercase tracking-tight">{error}</div>}
                                <button type="submit" className="w-full bg-orange-500 text-white p-5 rounded-2xl font-black text-lg shadow-lg hover:bg-orange-600 active:scale-95 transition-all mt-4">DEFTERİ AÇ</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 pb-32">
                    {/* Header */}
                    <header className="flex justify-between items-start mb-10">
                        <div>
                            <h1 className="text-3xl font-black text-slate-900 italic tracking-tighter uppercase">LEZZET<span className="text-orange-500 not-italic">DEFTERİM</span></h1>
                            <div className="flex items-center gap-2 mt-1">
                                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                <p className="text-slate-400 text-[9px] font-black uppercase tracking-widest">Çevrimdışı Mod / Yerel Hafıza</p>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => {resetForm(); setIsAddingNew(true);}} className="bg-orange-500 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-xl hover:scale-105 active:scale-95 transition-all text-2xl border-b-4 border-orange-700">
                                <SimpleIcon type="plus" />
                            </button>
                            <button onClick={handleLogout} className="bg-white text-slate-300 w-14 h-14 rounded-2xl flex items-center justify-center border border-slate-100 hover:text-red-400 transition-colors">
                                <SimpleIcon type="logout" />
                            </button>
                        </div>
                    </header>

                    {!isAddingNew && !isEditing && !viewingRecipe && (
                        <>
                            {/* Search & Stats */}
                            <div className="relative mb-8">
                                <div className="absolute left-5 top-1/2 -translate-y-1/2 opacity-30"><SimpleIcon type="search" /></div>
                                <input className="w-full p-6 pl-14 rounded-3xl bg-white shadow-sm border border-slate-100 outline-none font-semibold text-slate-600" placeholder="Bir lezzet arayın..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            </div>

                            {/* Filters */}
                            <div className="flex gap-2 overflow-x-auto pb-4 no-scrollbar mb-8">
                                {categories.map(c => (
                                    <button key={c} onClick={() => {setSelectedCategory(c); setShowFavoritesOnly(false);}} className={`px-6 py-3 rounded-2xl font-black text-[11px] uppercase tracking-wider whitespace-nowrap transition-all border-2 ${selectedCategory === c && !showFavoritesOnly ? 'bg-slate-900 border-slate-900 text-white shadow-lg' : 'bg-white border-slate-100 text-slate-400 hover:border-orange-200'}`}>{c}</button>
                                ))}
                                <button onClick={() => {setShowFavoritesOnly(!showFavoritesOnly); setSelectedCategory('Hepsi');}} className={`px-6 py-3 rounded-2xl font-black text-[11px] uppercase tracking-wider whitespace-nowrap transition-all border-2 ${showFavoritesOnly ? 'bg-pink-500 border-pink-500 text-white shadow-lg' : 'bg-white border-slate-100 text-pink-400 hover:border-pink-200'}`}>
                                    <SimpleIcon type="heart" active={showFavoritesOnly} /> Favoriler
                                </button>
                            </div>

                            {/* Grid */}
                            {filteredRecipes.length > 0 ? (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {filteredRecipes.map(r => (
                                        <div key={r.id} onClick={() => setViewingRecipe(r)} className="recipe-card bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 relative group flex flex-col h-full">
                                            <div className="flex justify-between items-start mb-6">
                                                <span className="text-[10px] font-black text-orange-600 bg-orange-50 px-4 py-2 rounded-xl uppercase tracking-tighter">{r.category}</span>
                                                <button onClick={(e) => toggleFavorite(e, r.id)} className="p-3 hover:bg-pink-50 rounded-2xl transition-colors">
                                                    <SimpleIcon type="heart" active={r.isFavorite} />
                                                </button>
                                            </div>
                                            <h3 className="text-2xl font-black text-slate-800 mb-8 leading-tight flex-grow">{r.title}</h3>
                                            <div className="pt-6 border-t border-slate-50 flex items-center justify-between text-slate-400 text-[10px] font-black uppercase tracking-widest">
                                                <div className="flex items-center gap-2"><SimpleIcon type="clock" /> {r.prepTime || '0'} DK</div>
                                                <span className="text-orange-500 group-hover:translate-x-1 transition-transform">DETAYLAR →</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="text-center py-20 bg-slate-100/50 rounded-[3rem] border-2 border-dashed border-slate-200">
                                    <div className="text-4xl mb-4 grayscale opacity-20"><SimpleIcon type="book" /></div>
                                    <p className="font-black text-slate-400 uppercase tracking-widest text-xs">Burada henüz bir şey yok şefim.</p>
                                </div>
                            )}
                        </>
                    )}

                    {/* View Detail */}
                    {viewingRecipe && (
                        <div className="bg-white rounded-[3.5rem] p-8 md:p-14 border border-slate-100 shadow-xl auth-card">
                            <div className="flex flex-wrap justify-between items-center gap-4 mb-12">
                                <button onClick={() => setViewingRecipe(null)} className="bg-slate-50 text-slate-900 px-6 py-3 rounded-2xl font-black flex items-center gap-3 uppercase text-[10px] tracking-widest hover:bg-slate-100 transition-all"><SimpleIcon type="back" /> LİSTEYE DÖN</button>
                                <div className="flex gap-2">
                                    <button onClick={() => startEditing(viewingRecipe)} className="bg-slate-900 text-white px-8 py-3 rounded-2xl font-black text-[10px] tracking-widest uppercase flex items-center gap-3 shadow-xl hover:scale-105 transition-all"><SimpleIcon type="edit" /> DÜZENLE</button>
                                    <button onClick={() => deleteRecipe(viewingRecipe.id)} className="bg-red-50 text-red-300 w-12 h-12 rounded-2xl flex items-center justify-center hover:bg-red-500 hover:text-white transition-all"><SimpleIcon type="trash" /></button>
                                </div>
                            </div>

                            <div className="mb-12">
                                <div className="text-orange-500 font-black text-[10px] uppercase tracking-[0.3em] mb-3">{viewingRecipe.category} • {viewingRecipe.prepTime} DAKİKA</div>
                                <h2 className="text-5xl font-black text-slate-900 leading-none tracking-tighter">{viewingRecipe.title}</h2>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-16">
                                <div className="space-y-8">
                                    <h4 className="font-black text-slate-900 flex items-center gap-4 uppercase text-xs tracking-[0.2em]"><span className="w-8 h-8 bg-orange-100 rounded-lg flex items-center justify-center text-sm"><SimpleIcon type="list" /></span> MALZEMELER</h4>
                                    <div className="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-100">
                                        <ul className="space-y-4">
                                            {(viewingRecipe.ingredients || '').split('\n').filter(i => i.trim()).map((item, idx) => (
                                                <li key={idx} className="flex items-start gap-4 text-slate-700 text-sm font-semibold leading-relaxed">
                                                    <span className="text-orange-500 mt-1"><SimpleIcon type="dot" /></span> {item}
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                </div>
                                <div className="space-y-8">
                                    <h4 className="font-black text-slate-900 flex items-center gap-4 uppercase text-xs tracking-[0.2em]"><span className="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center text-sm"><SimpleIcon type="book" /></span> HAZIRLANIŞI</h4>
                                    <div className="text-slate-600 whitespace-pre-wrap leading-relaxed font-medium text-base">
                                        {viewingRecipe.instructions}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Add / Edit Form */}
                    {(isAddingNew || isEditing) && (
                        <div className="bg-white rounded-[3.5rem] p-8 md:p-14 border border-slate-100 shadow-2xl auth-card">
                            <div className="flex justify-between items-center mb-12">
                                <div>
                                    <h2 className="text-3xl font-black italic uppercase tracking-tighter">{isEditing ? 'TARİFİ DÜZENLE' : 'YENİ LEZZET EKLE'}</h2>
                                    <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">Bilgileri eksiksiz girin şefim</p>
                                </div>
                                <button onClick={closeModals} className="bg-slate-50 p-4 rounded-2xl hover:bg-slate-100 transition-colors"><SimpleIcon type="x" /></button>
                            </div>

                            <form onSubmit={saveRecipe} className="space-y-8">
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-400 ml-4 uppercase tracking-widest">Yemek İsmi</label>
                                    <input value={formTitle} onChange={(e) => setFormTitle(e.target.value)} className="w-full bg-slate-50 p-6 rounded-[2rem] outline-none font-black text-xl text-slate-800" placeholder="Örn: Dağ Kekikli Biftek" required />
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 ml-4 uppercase tracking-widest">Kategori</label>
                                        <select value={formCategory} onChange={(e) => setFormCategory(e.target.value)} className="w-full bg-slate-50 p-6 rounded-[2rem] font-black text-slate-700 outline-none appearance-none">
                                            {categories.filter(c => c !== 'Hepsi').map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 ml-4 uppercase tracking-widest">Hazırlama Süresi (DK)</label>
                                        <input value={formPrepTime} onChange={(e) => setFormPrepTime(e.target.value)} type="number" className="w-full bg-slate-50 p-6 rounded-[2rem] font-black text-slate-700 outline-none" placeholder="Örn: 45" />
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-400 ml-4 uppercase tracking-widest">Malzemeler (Her satıra bir tane)</label>
                                    <textarea value={formIngredients} onChange={(e) => setFormIngredients(e.target.value)} className="w-full bg-slate-50 p-8 rounded-[2.5rem] h-40 font-bold text-slate-600 outline-none resize-none" placeholder="2 Adet Yumurta&#10;1 Bardak Süt..."></textarea>
                                </div>

                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-400 ml-4 uppercase tracking-widest">Nasıl Yapılır?</label>
                                    <textarea value={formInstructions} onChange={(e) => setFormInstructions(e.target.value)} className="w-full bg-slate-50 p-8 rounded-[2.5rem] h-60 font-bold text-slate-600 outline-none resize-none" placeholder="Adım adım anlatın..."></textarea>
                                </div>

                                <button type="submit" className="w-full bg-orange-500 text-white p-8 rounded-[2.5rem] font-black text-xl shadow-xl hover:bg-orange-600 active:scale-[0.98] transition-all uppercase tracking-tight border-b-8 border-orange-700">
                                    {isEditing ? 'DEĞİŞİKLİKLERİ KAYDET' : 'DEFTERE EKLE'}
                                </button>
                            </form>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
