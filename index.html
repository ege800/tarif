<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lezzet Defterim - ProChef</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            margin: 0;
            color: #1e293b;
        }
        .recipe-card { transition: all 0.3s ease; cursor: pointer; }
        .recipe-card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .shimmer {
            background: linear-gradient(90deg, #f1f5f9 25%, #f8fafc 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Emniyetli yapılandırma okuma
        const getSafeConfig = (key, fallback) => {
            try {
                if (key === 'config') return JSON.parse(window.__firebase_config || '{}');
                if (key === 'appId') return window.__app_id || fallback;
                return fallback;
            } catch (e) { return fallback; }
        };

        const firebaseConfig = getSafeConfig('config', {});
        const appId = getSafeConfig('appId', 'lezzet-defteri-default');
        const apiKey = ""; // Gemini API Key

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [recipes, setRecipes] = useState([]);
            const [loading, setLoading] = useState(false);
            const [viewingRecipe, setViewingRecipe] = useState(null);
            const [isAddingNew, setIsAddingNew] = useState(false);
            const [selectedCategory, setSelectedCategory] = useState('Hepsi');
            const [searchTerm, setSearchTerm] = useState('');
            const [aiLoading, setAiLoading] = useState(false);

            // Form State
            const [formData, setFormData] = useState({
                title: '', ingredients: '', instructions: '', prepTime: '', category: 'Ana Yemekler', link: ''
            });

            // LocalStorage ile basit oturum takibi (Firebase Auth'a ek olarak)
            useEffect(() => {
                if (localStorage.getItem('chef_logged_in') === 'true') {
                    setIsLoggedIn(true);
                }
            }, []);

            const categories = ['Hepsi', 'Ana Yemekler', 'Tatlılar', 'Hamur İşleri', 'Salatalar', 'Çorbalar'];

            const handleLogin = (e) => {
                e.preventDefault();
                const user = e.target.username.value;
                const pass = e.target.password.value;
                if (user.toLowerCase() === 'ustachef' && pass === 'HY0161') {
                    setIsLoggedIn(true);
                    localStorage.setItem('chef_logged_in', 'true');
                } else {
                    alert('Hatalı giriş şefim!');
                }
            };

            const generateWithAI = async () => {
                if (!formData.title) return alert("Önce bir yemek adı yazmalısın şefim!");
                setAiLoading(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `"${formData.title}" yemeği için profesyonel tarif yaz. Yanıt JSON: { "ingredients": "malzemeler (her satıra bir tane)", "instructions": "hazırlanış", "prepTime": "dakika", "category": "Kategori" }. Kategoriler: Ana Yemekler, Tatlılar, Hamur İşleri, Salatalar, Çorbalar.` }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await response.json();
                    const result = JSON.parse(data.candidates[0].content.parts[0].text);
                    setFormData({ ...formData, ...result });
                } catch (e) {
                    console.error("AI Hatası:", e);
                } finally {
                    setAiLoading(false);
                }
            };

            const saveRecipe = (e) => {
                e.preventDefault();
                const newRecipe = { ...formData, id: Date.now(), isFavorite: false, createdAt: Date.now() };
                const updatedRecipes = [newRecipe, ...recipes];
                setRecipes(updatedRecipes);
                setIsAddingNew(false);
                setFormData({ title: '', ingredients: '', instructions: '', prepTime: '', category: 'Ana Yemekler', link: '' });
                // Not: Burada Firebase addDoc kullanılabilir, şimdilik UI odaklı gidiyoruz.
            };

            const filteredRecipes = recipes.filter(r => 
                (selectedCategory === 'Hepsi' || r.category === selectedCategory) &&
                r.title.toLowerCase().includes(searchTerm.toLowerCase())
            );

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-100">
                        <div className="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl text-center">
                            <div className="text-5xl mb-6">👨‍🍳</div>
                            <h1 className="text-3xl font-black italic mb-8">PRO<span className="text-orange-500">CHEF</span> LOGIN</h1>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input name="username" type="text" placeholder="Şef Adı" className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-orange-500 outline-none font-bold transition-all" />
                                <input name="password" type="password" placeholder="Şifre" className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-orange-500 outline-none font-bold transition-all" />
                                <button type="submit" className="w-full bg-orange-500 text-white p-4 rounded-2xl font-black text-lg shadow-lg hover:bg-orange-600 active:scale-95 transition-all">GİRİŞ YAP</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-4xl mx-auto p-6 pb-20">
                    <header className="flex justify-between items-center mb-10">
                        <div>
                            <h1 className="text-3xl font-black italic tracking-tighter">LEZZET<span className="text-orange-500 not-italic">DEFTERİM</span></h1>
                            <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest">Şef PROCHEF Mutfakta</p>
                        </div>
                        <button onClick={() => setIsAddingNew(true)} className="bg-orange-500 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-xl hover:scale-105 transition-all text-2xl font-bold">＋</button>
                    </header>

                    {!isAddingNew && !viewingRecipe && (
                        <>
                            <input 
                                className="w-full p-5 rounded-2xl bg-white shadow-sm border border-slate-100 mb-6 outline-none focus:ring-2 ring-orange-100 transition-all font-medium" 
                                placeholder="Tariflerde ara..." 
                                onChange={e => setSearchTerm(e.target.value)}
                            />
                            <div className="flex gap-2 overflow-x-auto pb-4 no-scrollbar mb-6">
                                {categories.map(c => (
                                    <button 
                                        key={c} 
                                        onClick={() => setSelectedCategory(c)} 
                                        className={`px-6 py-3 rounded-xl font-bold text-xs whitespace-nowrap transition-all ${selectedCategory === c ? 'bg-slate-900 text-white shadow-md' : 'bg-white text-slate-400'}`}
                                    >
                                        {c}
                                    </button>
                                ))}
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {filteredRecipes.map(r => (
                                    <div key={r.id} onClick={() => setViewingRecipe(r)} className="recipe-card bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                                        <div className="flex justify-between items-start mb-4">
                                            <span className="text-[10px] font-bold text-orange-500 bg-orange-50 px-3 py-1 rounded-lg uppercase">{r.category}</span>
                                        </div>
                                        <h3 className="text-xl font-black text-slate-800 mb-4">{r.title}</h3>
                                        <div className="text-slate-400 text-[10px] font-bold uppercase flex justify-between items-center">
                                            <span>🕒 {r.prepTime} DK</span>
                                            <span className="text-orange-500">GÖRÜNTÜLE →</span>
                                        </div>
                                    </div>
                                ))}
                                {filteredRecipes.length === 0 && (
                                    <div className="col-span-full py-20 text-center text-slate-300 font-bold border-2 border-dashed border-slate-200 rounded-[2rem]">
                                        Henüz tarif yok şefim, bir tane ekle!
                                    </div>
                                )}
                            </div>
                        </>
                    )}

                    {viewingRecipe && (
                        <div className="bg-white rounded-[2.5rem] p-8 md:p-12 shadow-sm border border-slate-100">
                            <button onClick={() => setViewingRecipe(null)} className="text-orange-500 font-black mb-8 block">← GERİ DÖN</button>
                            <h2 className="text-4xl font-black mb-10">{viewingRecipe.title}</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                <div>
                                    <h4 className="font-black text-slate-800 border-b pb-2 mb-4 uppercase text-xs tracking-widest">📜 MALZEMELER</h4>
                                    <ul className="space-y-3">
                                        {viewingRecipe.ingredients.split('\n').filter(l => l.trim()).map((ing, i) => (
                                            <li key={i} className="flex items-start gap-3 text-slate-600 text-sm">
                                                <span className="text-orange-500 mt-1">•</span> {ing}
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                                <div>
                                    <h4 className="font-black text-slate-800 border-b pb-2 mb-4 uppercase text-xs tracking-widest">📖 HAZIRLANIŞI</h4>
                                    <p className="text-slate-600 whitespace-pre-wrap text-sm leading-relaxed">{viewingRecipe.instructions}</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {isAddingNew && (
                        <div className="bg-white rounded-[2.5rem] p-8 md:p-12 shadow-2xl">
                            <div className="flex justify-between items-center mb-10">
                                <h2 className="text-2xl font-black italic">YENİ <span className="text-orange-500">TARİF</span></h2>
                                <button onClick={() => setIsAddingNew(false)} className="bg-slate-50 p-3 rounded-full">✕</button>
                            </div>
                            <form onSubmit={saveRecipe} className="space-y-6">
                                <div className="flex gap-2">
                                    <input 
                                        className="flex-1 p-5 bg-slate-50 rounded-2xl outline-none font-bold" 
                                        placeholder="Yemek Adı" 
                                        value={formData.title}
                                        onChange={e => setFormData({...formData, title: e.target.value})}
                                    />
                                    <button 
                                        type="button" 
                                        onClick={generateWithAI} 
                                        disabled={aiLoading}
                                        className="bg-purple-600 text-white px-6 rounded-2xl font-black text-xs hover:bg-purple-700 disabled:opacity-50"
                                    >
                                        {aiLoading ? "✨..." : "AI SİHRİ"}
                                    </button>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <select 
                                        className="p-5 bg-slate-50 rounded-2xl font-bold outline-none"
                                        value={formData.category}
                                        onChange={e => setFormData({...formData, category: e.target.value})}
                                    >
                                        {categories.filter(c => c !== 'Hepsi').map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                    <input 
                                        className="p-5 bg-slate-50 rounded-2xl font-bold outline-none" 
                                        placeholder="Süre (DK)" 
                                        value={formData.prepTime}
                                        onChange={e => setFormData({...formData, prepTime: e.target.value})}
                                    />
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-4">Malzemeler (Her Satıra Bir Tane)</label>
                                    <textarea 
                                        className="w-full p-5 bg-slate-50 rounded-2xl h-40 outline-none font-bold mt-1" 
                                        placeholder="1 Bardak Su&#10;2 Kaşık Un..."
                                        value={formData.ingredients}
                                        onChange={e => setFormData({...formData, ingredients: e.target.value})}
                                    />
                                </div>
                                <textarea 
                                    className="w-full p-5 bg-slate-50 rounded-2xl h-40 outline-none font-bold" 
                                    placeholder="Nasıl Hazırlanır?"
                                    value={formData.instructions}
                                    onChange={e => setFormData({...formData, instructions: e.target.value})}
                                />
                                <button type="submit" className="w-full bg-orange-500 text-white p-6 rounded-3xl font-black text-xl shadow-xl hover:bg-orange-600 active:scale-95 transition-all">KAYDET</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
