<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lezzet Defterim - Koleksiyon</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .recipe-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .recipe-card:hover { transform: translateY(-4px); box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK Modülleri -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global erişim için window objesine bağlayalım (Babel scripti için)
        window.fb = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc };
    </script>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        // Window objesine bağladığımız Firebase fonksiyonlarını alalım
        const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc } = window.fb;

        // Firebase Yapılandırması
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const DEFAULT_RECIPES = [
            {
                id: "default-1",
                title: "Anne Köftesi",
                category: "Ana Yemekler",
                prepTime: "30",
                ingredients: "500gr Kıyma\n1 adet Soğan\n1 adet Yumurta\nYarım demet Maydanoz\nGaleta unu, Tuz, Karabiber, Kimyon",
                instructions: "1. Soğanı rendeleyin ve suyunu sıkın.\n2. Tüm malzemeleri yoğurun.\n3. Şekil verip kızartın.",
                isFavorite: true,
                link: "https://youtube.com",
                linkText: "Videolu Anlatım"
            }
        ];

        const SimpleIcon = ({ type, active }) => {
            const icons = {
                search: "🔍", heart: active ? "❤️" : "🤍", 
                clock: "🕒", chef: "👨‍🍳", 
                book: "📖", x: "❌", list: "📜", link: "🔗", plus: "➕", check: "✅"
            };
            return <span className={`inline-block ${active ? 'scale-110' : ''}`}>{icons[type]}</span>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [recipes, setRecipes] = useState(DEFAULT_RECIPES);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('Hepsi');
            const [viewingRecipe, setViewingRecipe] = useState(null);
            const [showFavsOnly, setShowFavsOnly] = useState(false);
            const [isAddMode, setIsAddMode] = useState(false);
            const [loading, setLoading] = useState(true);

            const [formData, setFormData] = useState({
                title: '', category: 'Ana Yemekler', prepTime: '', ingredients: '', instructions: '', link: '', linkText: ''
            });

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Kimlik doğrulama hatası:", error);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;

                const recipesCollection = collection(db, 'artifacts', appId, 'public', 'data', 'recipes');
                
                const unsubscribe = onSnapshot(recipesCollection, (snapshot) => {
                    const cloudRecipes = snapshot.docs.map(doc => ({
                        ...doc.data(),
                        id: doc.id,
                        isCloud: true
                    }));
                    
                    setRecipes([...DEFAULT_RECIPES, ...cloudRecipes]);
                    setLoading(false);
                }, (error) => {
                    console.error("Senkronizasyon hatası:", error);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            const toggleFavorite = async (e, recipe) => {
                e.stopPropagation();
                if (recipe.isCloud) {
                    const recipeRef = doc(db, 'artifacts', appId, 'public', 'data', 'recipes', recipe.id);
                    await updateDoc(recipeRef, { isFavorite: !recipe.isFavorite });
                } else {
                    setRecipes(prev => prev.map(r => 
                        r.id === recipe.id ? { ...r, isFavorite: !r.isFavorite } : r
                    ));
                }
            };

            const handleAddNewRecipe = async (e) => {
                e.preventDefault();
                if (!user) return;

                try {
                    const recipesCollection = collection(db, 'artifacts', appId, 'public', 'data', 'recipes');
                    await addDoc(recipesCollection, {
                        ...formData,
                        createdAt: new Date().toISOString(),
                        isFavorite: false,
                        createdBy: user.uid
                    });

                    setFormData({ title: '', category: 'Ana Yemekler', prepTime: '', ingredients: '', instructions: '', link: '', linkText: '' });
                    setIsAddMode(false);
                } catch (error) {
                    console.error(error);
                    alert("Tarif eklenirken bir hata oluştu.");
                }
            };

            const filtered = useMemo(() => {
                return recipes.filter(r => {
                    const mSearch = r.title.toLowerCase().includes(searchTerm.toLowerCase());
                    const mCat = selectedCategory === 'Hepsi' || r.category === selectedCategory;
                    const mFav = showFavsOnly ? r.isFavorite : true;
                    return mSearch && mCat && mFav;
                });
            }, [recipes, searchTerm, selectedCategory, showFavsOnly]);

            return (
                <div className="max-w-4xl mx-auto p-6 pb-24">
                    <header className="flex justify-between items-center mb-12">
                        <div className="flex items-center gap-4">
                            <div className="text-3xl bg-white w-14 h-14 flex items-center justify-center rounded-2xl shadow-sm border border-slate-100">
                                <SimpleIcon type="chef" />
                            </div>
                            <div>
                                <h1 className="text-xl font-black italic tracking-tighter uppercase leading-none text-slate-900">LEZZET<span className="text-orange-500">DEFTERİM</span></h1>
                                <p className="text-[8px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1">Paylaşımlı Mutfak</p>
                            </div>
                        </div>
                        <button 
                            onClick={() => { setIsAddMode(!isAddMode); setViewingRecipe(null); }}
                            className={`px-6 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all flex items-center gap-2 ${isAddMode ? 'bg-slate-200 text-slate-600' : 'bg-orange-500 text-white shadow-lg shadow-orange-100'}`}
                        >
                            <SimpleIcon type={isAddMode ? 'x' : 'plus'} /> {isAddMode ? 'VAZGEÇ' : 'YENİ TARİF'}
                        </button>
                    </header>

                    {!viewingRecipe && !isAddMode && (
                        <div className="fade-in">
                            <div className="relative mb-8">
                                <input 
                                    className="w-full p-6 pl-14 rounded-[2rem] bg-white shadow-sm border border-slate-100 outline-none font-bold text-slate-700 focus:ring-2 ring-orange-100 transition-all" 
                                    placeholder="Tarif ara..." 
                                    value={searchTerm} 
                                    onChange={e => setSearchTerm(e.target.value)} 
                                />
                                <div className="absolute left-6 top-1/2 -translate-y-1/2 opacity-30"><SimpleIcon type="search" /></div>
                            </div>

                            <div className="flex gap-2 overflow-x-auto pb-4 no-scrollbar mb-8">
                                {['Hepsi', 'Ana Yemekler', 'Tatlılar', 'Hamur İşleri', 'Çorbalar'].map(c => (
                                    <button 
                                        key={c} 
                                        onClick={() => {setSelectedCategory(c); setShowFavsOnly(false);}} 
                                        className={`px-6 py-3 rounded-2xl text-[11px] font-black uppercase tracking-wider transition-all border-2 whitespace-nowrap ${selectedCategory === c && !showFavsOnly ? 'bg-slate-900 border-slate-900 text-white shadow-lg' : 'bg-white border-slate-100 text-slate-400 hover:border-orange-200'}`}
                                    >
                                        {c}
                                    </button>
                                ))}
                                <button 
                                    onClick={() => setShowFavsOnly(!showFavsOnly)}
                                    className={`px-6 py-3 rounded-2xl text-[11px] font-black uppercase tracking-wider transition-all border-2 whitespace-nowrap ${showFavsOnly ? 'bg-red-500 border-red-500 text-white shadow-lg' : 'bg-white border-slate-100 text-red-400 hover:border-red-200'}`}
                                >
                                    <SimpleIcon type="heart" active={showFavsOnly} /> FAVORİLER
                                </button>
                            </div>

                            {loading ? (
                                <div className="text-center py-20 animate-pulse text-slate-400 font-bold uppercase tracking-widest text-xs">Yükleniyor...</div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    {filtered.map(r => (
                                        <div key={r.id} onClick={() => setViewingRecipe(r)} className="recipe-card bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm relative group">
                                            <div className="flex justify-between items-start mb-6">
                                                <div className="flex gap-2">
                                                    <span className="text-[10px] font-black bg-orange-50 text-orange-600 px-4 py-2 rounded-xl uppercase">{r.category}</span>
                                                    {r.isCloud && <span className="text-[10px] font-black bg-blue-50 text-blue-600 px-4 py-2 rounded-xl uppercase">Ortak</span>}
                                                </div>
                                                <button 
                                                    onClick={(e) => toggleFavorite(e, r)}
                                                    className="hover:scale-125 transition-transform p-2"
                                                >
                                                    <SimpleIcon type="heart" active={r.isFavorite} />
                                                </button>
                                            </div>
                                            <h3 className="text-2xl font-black text-slate-800 mb-8 leading-tight">{r.title}</h3>
                                            <div className="flex items-center text-[10px] font-black text-slate-400 gap-6 pt-6 border-t border-slate-50">
                                                <span><SimpleIcon type="clock" /> {r.prepTime} DK</span>
                                                <span className="ml-auto text-orange-500 uppercase tracking-widest group-hover:translate-x-1 transition-transform">Gör →</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {isAddMode && (
                        <div className="fade-in bg-white rounded-[3rem] p-10 border border-slate-100 shadow-2xl">
                            <h2 className="text-3xl font-black mb-10 italic tracking-tight text-slate-900">YENİ TARİF EKLE</h2>
                            <form onSubmit={handleAddNewRecipe} className="space-y-6">
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-400 ml-4 uppercase">Yemek İsmi</label>
                                    <input required placeholder="Örn: Zeytinyağlı Sarma" className="w-full p-5 bg-slate-50 rounded-2xl border-none font-bold text-lg outline-none focus:ring-2 ring-orange-200" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                                </div>
                                <div className="grid grid-cols-2 gap-6">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 ml-4 uppercase">Kategori</label>
                                        <select className="w-full p-5 bg-slate-50 rounded-2xl font-bold outline-none" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>
                                            <option>Ana Yemekler</option>
                                            <option>Tatlılar</option>
                                            <option>Hamur İşleri</option>
                                            <option>Çorbalar</option>
                                        </select>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 ml-4 uppercase">Süre (Dk)</label>
                                        <input required placeholder="45" type="number" className="w-full p-5 bg-slate-50 rounded-2xl font-bold outline-none" value={formData.prepTime} onChange={e => setFormData({...formData, prepTime: e.target.value})} />
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-400 ml-4 uppercase">Malzemeler</label>
                                    <textarea required placeholder="Her malzemeyi yeni satıra yazın..." className="w-full p-6 bg-slate-50 rounded-[2rem] h-32 font-medium outline-none" value={formData.ingredients} onChange={e => setFormData({...formData, ingredients: e.target.value})} />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-400 ml-4 uppercase">Nasıl Hazırlanır?</label>
                                    <textarea required placeholder="Adım adım anlatın..." className="w-full p-6 bg-slate-50 rounded-[2rem] h-48 font-medium outline-none" value={formData.instructions} onChange={e => setFormData({...formData, instructions: e.target.value})} />
                                </div>
                                <button type="submit" className="w-full bg-slate-900 text-white p-7 rounded-[2.5rem] font-black text-xl shadow-2xl hover:bg-orange-600 transition-all uppercase tracking-tighter mt-4 flex items-center justify-center gap-3">
                                    <SimpleIcon type="check" /> HERKES İÇİN EKLE
                                </button>
                            </form>
                        </div>
                    )}

                    {viewingRecipe && (
                        <div className="bg-white rounded-[3rem] p-10 border border-slate-100 shadow-2xl fade-in">
                            <div className="flex justify-between items-center mb-10">
                                <button onClick={() => setViewingRecipe(null)} className="text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-orange-500 transition-colors flex items-center gap-2">
                                    ⬅ LİSTEYE DÖN
                                </button>
                                <button onClick={(e) => toggleFavorite(e, viewingRecipe)}>
                                    <SimpleIcon type="heart" active={viewingRecipe.isFavorite} />
                                </button>
                            </div>
                            
                            <div className="mb-12 flex flex-wrap justify-between items-end gap-4">
                                <div>
                                    <span className="text-orange-500 font-black text-[11px] uppercase tracking-[0.2em]">{viewingRecipe.category}</span>
                                    <h2 className="text-5xl font-black text-slate-900 mt-2 tracking-tighter leading-tight">{viewingRecipe.title}</h2>
                                </div>
                            </div>
                            
                            <div className="grid md:grid-cols-2 gap-12">
                                <div className="space-y-6">
                                    <h4 className="font-black text-xs uppercase tracking-widest flex items-center gap-2 text-slate-800">
                                        <span className="w-8 h-8 bg-orange-100 rounded-lg flex items-center justify-center"><SimpleIcon type="list" /></span> Malzemeler
                                    </h4>
                                    <div className="bg-slate-50 p-8 rounded-[2rem] text-sm font-semibold text-slate-600 whitespace-pre-wrap border border-slate-100 italic">{viewingRecipe.ingredients}</div>
                                </div>
                                <div className="space-y-6">
                                    <h4 className="font-black text-xs uppercase tracking-widest flex items-center gap-2 text-slate-800">
                                        <span className="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center"><SimpleIcon type="book" /></span> Nasıl Yapılır?
                                    </h4>
                                    <div className="text-slate-600 font-medium leading-relaxed whitespace-pre-wrap text-base">{viewingRecipe.instructions}</div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="mt-20 text-center">
                        <p className="text-[10px] font-black text-slate-300 uppercase tracking-[0.5em]">Koleksiyon Şefi • 2024</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
