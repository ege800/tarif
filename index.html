<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lezzet Defterim - Modern Menü Yönetimi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        
        :root {
            --brand-orange: #f97316;
            --brand-dark: #0f172a;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fdfdfd; 
            color: var(--brand-dark);
            -webkit-tap-highlight-color: transparent;
        }

        .serif { font-family: 'Playfair Display', serif; }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(241, 245, 249, 1);
        }

        .recipe-card { 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
        }
        
        .recipe-card:hover { 
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
        }

        .category-pill {
            transition: all 0.3s ease;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK Modülleri -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.fb = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc, serverTimestamp };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const App = () => {
            const [fbReady, setFbReady] = useState(!!window.fb);
            const [user, setUser] = useState(null);
            const [recipes, setRecipes] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('Hepsi');
            const [viewingRecipe, setViewingRecipe] = useState(null);
            const [isAddMode, setIsAddMode] = useState(false);
            const [loading, setLoading] = useState(true);

            const DEFAULT_RECIPES = [
                {
                    id: "default-1",
                    title: "İmza Izgara Antrikot",
                    category: "Ana Yemekler",
                    prepTime: "45",
                    ingredients: "300gr Dinlendirilmiş Antrikot\nTaze Biberiye\nDeniz Tuzu\nTereyağı",
                    instructions: "Et mühürlenir, tereyağı ve biberiye ile aromalandırılır.",
                    isFavorite: true
                }
            ];

            // Firebase Yapılandırması Kontrolü
            const configRaw = typeof __firebase_config !== 'undefined' ? __firebase_config : `{
                "apiKey": "BURAYA_API_KEY_GELECEK",
                "authDomain": "PROJE_ID.firebaseapp.com",
                "projectId": "PROJE_ID",
                "storageBucket": "PROJE_ID.appspot.com",
                "messagingSenderId": "SENDER_ID",
                "appId": "APP_ID"
            }`;
            
            const firebaseConfig = JSON.parse(configRaw);
            const isConfigValid = firebaseConfig.apiKey && firebaseConfig.apiKey !== "BURAYA_API_KEY_GELECEK";

            // LocalStorage'dan veri yükleme (Yedek mod)
            const loadLocalRecipes = () => {
                const saved = localStorage.getItem('lezzet_defterim_local');
                return saved ? JSON.parse(saved) : [];
            };

            const saveLocalRecipe = (newRecipe) => {
                const current = loadLocalRecipes();
                const updated = [...current, { ...newRecipe, id: Date.now().toString(), isLocal: true }];
                localStorage.setItem('lezzet_defterim_local', JSON.stringify(updated));
                setRecipes([...DEFAULT_RECIPES, ...updated]);
            };

            useEffect(() => {
                const handleFbReady = () => setFbReady(true);
                window.addEventListener('firebase-ready', handleFbReady);
                if (window.fb) setFbReady(true);
                return () => window.removeEventListener('firebase-ready', handleFbReady);
            }, []);

            useEffect(() => {
                // Eğer yapılandırma yoksa veya Firebase hazır değilse LocalStorage moduna geç
                if (!fbReady || !isConfigValid) {
                    const localData = loadLocalRecipes();
                    setRecipes([...DEFAULT_RECIPES, ...localData]);
                    setLoading(false);
                    return;
                }

                const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, onSnapshot } = window.fb;
                
                try {
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    const db = getFirestore(app);
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'external-github-app';

                    const initAuth = async () => {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    };

                    initAuth();

                    const unsubscribeAuth = onAuthStateChanged(auth, (user) => {
                        setUser(user);
                        if (user) {
                            const q = collection(db, 'artifacts', appId, 'public', 'data', 'recipes');
                            const unsubscribeSnapshot = onSnapshot(q, (snapshot) => {
                                const cloudData = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id, isCloud: true }));
                                const localData = loadLocalRecipes();
                                setRecipes([...DEFAULT_RECIPES, ...localData, ...cloudData]);
                                setLoading(false);
                            }, (err) => {
                                setRecipes([...DEFAULT_RECIPES, ...loadLocalRecipes()]);
                                setLoading(false);
                            });
                            return () => unsubscribeSnapshot();
                        }
                    });

                    return () => unsubscribeAuth();
                } catch (e) {
                    setRecipes([...DEFAULT_RECIPES, ...loadLocalRecipes()]);
                    setLoading(false);
                }
            }, [fbReady]);

            const [formData, setFormData] = useState({
                title: '', category: 'Ana Yemekler', prepTime: '', ingredients: '', instructions: ''
            });

            const handleAdd = async (e) => {
                e.preventDefault();
                
                // Eğer Firebase yoksa direkt LocalStorage'a kaydet
                if (!window.fb || !isConfigValid || !user) {
                    saveLocalRecipe(formData);
                    setFormData({ title: '', category: 'Ana Yemekler', prepTime: '', ingredients: '', instructions: '' });
                    setIsAddMode(false);
                    return;
                }

                const { getFirestore, collection, addDoc, serverTimestamp } = window.fb;
                try {
                    const db = getFirestore();
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'external-github-app';
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'recipes'), {
                        ...formData,
                        createdAt: serverTimestamp(),
                        isFavorite: false,
                        createdBy: user.uid
                    });
                    setFormData({ title: '', category: 'Ana Yemekler', prepTime: '', ingredients: '', instructions: '' });
                    setIsAddMode(false);
                } catch (e) { 
                    // Cloud hatası alırsak yine lokale yedekle
                    saveLocalRecipe(formData);
                    setIsAddMode(false);
                }
            };

            const filtered = useMemo(() => {
                return recipes.filter(r => {
                    const matchSearch = (r.title || "").toLowerCase().includes(searchTerm.toLowerCase());
                    const matchCat = selectedCategory === 'Hepsi' || r.category === selectedCategory;
                    return matchSearch && matchCat;
                });
            }, [recipes, searchTerm, selectedCategory]);

            const Icon = ({ name, className }) => {
                const icons = {
                    search: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>,
                    plus: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 4v16m8-8H4"/></svg>,
                    clock: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>,
                    heart: <svg className={className} fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>,
                    x: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
                };
                return icons[name] || null;
            };

            return (
                <div className="min-h-screen pb-20 px-4 md:px-0">
                    <nav className="max-w-5xl mx-auto py-10 flex justify-between items-center border-b border-slate-100 mb-12">
                        <div>
                            <h1 className="serif text-3xl tracking-tight leading-none">L'ART <span className="text-orange-500 italic">Cuisine</span></h1>
                            <p className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400 mt-2">
                                {isConfigValid ? "Cloud Aktif" : "Yerel Depolama Modu"}
                            </p>
                        </div>
                        <button 
                            onClick={() => { setIsAddMode(!isAddMode); setViewingRecipe(null); }}
                            className={`px-8 py-4 rounded-full text-xs font-bold tracking-widest transition-all flex items-center gap-2 shadow-xl ${isAddMode ? 'bg-slate-100 text-slate-500' : 'bg-slate-900 text-white hover:bg-orange-600 shadow-slate-200'}`}
                        >
                            <Icon name={isAddMode ? "x" : "plus"} className="w-4 h-4" />
                            {isAddMode ? "KAPAT" : "YENİ ÜRÜN"}
                        </button>
                    </nav>

                    <main className="max-w-5xl mx-auto">
                        {!isAddMode && !viewingRecipe && (
                            <div className="fade-in">
                                <div className="flex flex-col md:flex-row gap-6 mb-12">
                                    <div className="relative flex-1">
                                        <input 
                                            className="w-full p-6 pl-14 rounded-3xl glass-card outline-none text-sm font-semibold focus:ring-2 ring-orange-100 transition-all shadow-sm"
                                            placeholder="Menüde ara..."
                                            value={searchTerm}
                                            onChange={e => setSearchTerm(e.target.value)}
                                        />
                                        <Icon name="search" className="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-300" />
                                    </div>
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                                        {['Hepsi', 'Ana Yemekler', 'Tatlılar', 'Çorbalar'].map(c => (
                                            <button 
                                                key={c}
                                                onClick={() => setSelectedCategory(c)}
                                                className={`px-8 py-5 rounded-3xl text-[10px] font-black uppercase tracking-widest whitespace-nowrap category-pill ${selectedCategory === c ? 'bg-orange-500 text-white shadow-lg shadow-orange-100' : 'bg-white text-slate-400 border border-slate-100 hover:border-orange-200'}`}
                                            >
                                                {c}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {loading ? (
                                    <div className="text-center py-24 text-slate-300 animate-pulse font-black tracking-[0.5em] text-[10px] uppercase">Senkronize Ediliyor...</div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                        {filtered.map(r => (
                                            <div key={r.id} onClick={() => setViewingRecipe(r)} className="recipe-card glass-card p-10 rounded-[3rem] cursor-pointer relative group">
                                                <div className="flex justify-between items-start mb-10">
                                                    <div className="flex flex-col gap-1">
                                                        <span className="text-[9px] font-black text-orange-500 bg-orange-50 px-4 py-2 rounded-full uppercase tracking-widest w-fit">{r.category}</span>
                                                        {r.isLocal && <span className="text-[7px] font-bold text-slate-400 ml-1">CIHAZDA KAYITLI</span>}
                                                    </div>
                                                    {r.isFavorite && <Icon name="heart" className="w-4 h-4 text-red-500" />}
                                                </div>
                                                <h3 className="serif text-2xl mb-6 group-hover:text-orange-500 transition-colors leading-tight">{r.title}</h3>
                                                <div className="flex items-center gap-4 text-[10px] font-bold text-slate-400 border-t border-slate-50 pt-8 mt-10">
                                                    <Icon name="clock" className="w-3 h-3 text-orange-200" />
                                                    <span>{r.prepTime} DAKİKA</span>
                                                    <span className="ml-auto opacity-0 group-hover:opacity-100 transition-all translate-x-2 group-hover:translate-x-0 font-black text-orange-500">DETAY →</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {isAddMode && (
                            <div className="fade-in max-w-2xl mx-auto glass-card p-12 rounded-[4rem] border-2 border-slate-50 shadow-2xl">
                                <h2 className="serif text-4xl mb-12 text-slate-900 italic">Yeni Ürün Tanımı</h2>
                                <form onSubmit={handleAdd} className="space-y-8">
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Yemek Adı</label>
                                        <input required className="w-full p-6 bg-slate-50 rounded-3xl outline-none font-bold text-lg focus:bg-white focus:ring-2 ring-orange-50 transition-all" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-8">
                                        <div className="space-y-3">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Kategori</label>
                                            <select className="w-full p-6 bg-slate-50 rounded-3xl outline-none font-bold appearance-none cursor-pointer" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>
                                                <option>Ana Yemekler</option>
                                                <option>Tatlılar</option>
                                                <option>Çorbalar</option>
                                            </select>
                                        </div>
                                        <div className="space-y-3">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Hazırlık (Dk)</label>
                                            <input required type="number" className="w-full p-6 bg-slate-50 rounded-3xl outline-none font-bold" value={formData.prepTime} onChange={e => setFormData({...formData, prepTime: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">İçerik & Malzemeler</label>
                                        <textarea required className="w-full p-6 bg-slate-50 rounded-3xl outline-none font-medium h-32 resize-none" value={formData.ingredients} onChange={e => setFormData({...formData, ingredients: e.target.value})} />
                                    </div>
                                    <button className="w-full bg-slate-900 text-white p-8 rounded-full font-black text-sm tracking-[0.2em] shadow-2xl hover:bg-orange-500 transition-all uppercase mt-4">
                                        ÜRÜNÜ KAYDET
                                    </button>
                                </form>
                            </div>
                        )}

                        {viewingRecipe && (
                            <div className="fade-in max-w-4xl mx-auto glass-card p-16 rounded-[4rem] shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-orange-50 rounded-full blur-3xl opacity-50 -mr-32 -mt-32"></div>
                                <button onClick={() => setViewingRecipe(null)} className="text-[10px] font-black text-slate-300 hover:text-orange-500 tracking-[0.2em] mb-12 block transition-all relative z-10">← LİSTEYE DÖN</button>
                                <div className="mb-16 relative z-10">
                                    <span className="text-orange-500 font-bold text-xs uppercase tracking-[0.3em]">{viewingRecipe.category}</span>
                                    <h2 className="serif text-6xl mt-4 mb-4 text-slate-900">{viewingRecipe.title}</h2>
                                    <p className="text-slate-400 font-bold text-xs flex items-center gap-2">
                                        <Icon name="clock" className="w-4 h-4 text-orange-200" /> 
                                        {viewingRecipe.prepTime} DAKİKA HAZIRLIK SÜRESİ
                                    </p>
                                </div>
                                <div className="grid md:grid-cols-2 gap-20 relative z-10">
                                    <div className="space-y-8">
                                        <h4 className="font-black text-[10px] uppercase tracking-widest text-slate-800 border-b border-slate-100 pb-4 flex items-center gap-3">
                                            <span className="w-2 h-2 bg-orange-500 rounded-full"></span> İçindekiler
                                        </h4>
                                        <div className="text-slate-500 font-medium leading-loose whitespace-pre-wrap italic bg-slate-50/50 p-8 rounded-3xl border border-slate-50">
                                            {viewingRecipe.ingredients}
                                        </div>
                                    </div>
                                    <div className="space-y-8">
                                        <h4 className="font-black text-[10px] uppercase tracking-widest text-slate-800 border-b border-slate-100 pb-4 flex items-center gap-3">
                                            <span className="w-2 h-2 bg-slate-300 rounded-full"></span> Şefin Notu
                                        </h4>
                                        <div className="text-slate-600 font-medium leading-relaxed whitespace-pre-wrap">
                                            {viewingRecipe.instructions || "Bu ürün için henüz özel bir hazırlık notu eklenmemiş."}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                    <footer className="max-w-5xl mx-auto mt-24 text-center">
                        <p className="text-[9px] font-black text-slate-300 uppercase tracking-[1em]">L'ART CUISINE INFRASTRUCTURE</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
