<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lezzet Defterim</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel (Eski sürümlerle daha stabil çalışır) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .recipe-card { transition: all 0.2s; cursor: pointer; }
        .recipe-card:hover { transform: translateY(-4px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // Basit İkon Bileşeni (Lucide yerine daha hızlı Emoji/Metin tabanlı)
        const SimpleIcon = ({ type }) => {
            const icons = {
                plus: "＋",
                search: "🔍",
                heart: "♥",
                clock: "🕒",
                chef: "👨‍🍳",
                back: "←",
                trash: "🗑️",
                book: "📖"
            };
            return <span className="mr-1">{icons[type]}</span>;
        };

        const App = () => {
            const [recipes, setRecipes] = useState([
                {
                    id: 1,
                    title: 'Pesto Soslu Tavuklu Makarna',
                    category: 'Ana Yemekler',
                    ingredients: 'Penne makarna, Tavuk göğsü, Krema, Pesto sosu, Zeytinyağı',
                    instructions: '1. Makarnayı tuzlu suda haşlayın.\n2. Tavukları soteleyin.\n3. Sosla birleştirin.',
                    prepTime: '20 dk',
                    isFavorite: true
                }
            ]);

            const [searchTerm, setSearchTerm] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('Hepsi');
            const [isAddingNew, setIsAddingNew] = useState(false);
            const [viewingRecipe, setViewingRecipe] = useState(null);

            const categories = ['Hepsi', 'Ana Yemekler', 'Tatlılar', 'Hamur İşleri', 'Salatalar'];

            const [newRecipe, setNewRecipe] = useState({
                title: '', category: 'Ana Yemekler', ingredients: '', instructions: '', prepTime: '', isFavorite: false
            });

            const filteredRecipes = useMemo(() => {
                return recipes.filter(r => {
                    const matchesSearch = r.title.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesCat = selectedCategory === 'Hepsi' || r.category === selectedCategory;
                    return matchesSearch && matchesCat;
                });
            }, [recipes, searchTerm, selectedCategory]);

            const saveRecipe = () => {
                if (!newRecipe.title) return;
                setRecipes([{ ...newRecipe, id: Date.now() }, ...recipes]);
                setIsAddingNew(false);
                setNewRecipe({ title: '', category: 'Ana Yemekler', ingredients: '', instructions: '', prepTime: '', isFavorite: false });
            };

            // DETAY SAYFASI
            if (viewingRecipe) {
                return (
                    <div className="min-h-screen bg-white p-6 max-w-2xl mx-auto shadow-xl">
                        <button onClick={() => setViewingRecipe(null)} className="text-orange-500 font-bold mb-6 block">
                            <SimpleIcon type="back" /> Geri Dön
                        </button>
                        <span className="text-xs font-bold text-orange-500 bg-orange-50 px-2 py-1 rounded">{viewingRecipe.category}</span>
                        <h1 className="text-3xl font-extrabold mt-2">{viewingRecipe.title}</h1>
                        <div className="my-4 text-slate-500 border-b pb-4">
                            <SimpleIcon type="clock" /> {viewingRecipe.prepTime}
                        </div>
                        <h2 className="text-xl font-bold mb-2">Malzemeler</h2>
                        <div className="bg-slate-50 p-4 rounded-xl mb-6 whitespace-pre-wrap">{viewingRecipe.ingredients}</div>
                        <h2 className="text-xl font-bold mb-2">Nasıl Yapılır?</h2>
                        <p className="text-slate-700 leading-relaxed">{viewingRecipe.instructions}</p>
                    </div>
                );
            }

            // EKLEME SAYFASI
            if (isAddingNew) {
                return (
                    <div className="min-h-screen bg-white p-6 max-w-2xl mx-auto">
                        <h1 className="text-2xl font-bold mb-6">Yeni Tarif</h1>
                        <input className="w-full border p-3 rounded-xl mb-4" placeholder="Tarif Adı" value={newRecipe.title} onChange={e => setNewRecipe({...newRecipe, title: e.target.value})} />
                        <select className="w-full border p-3 rounded-xl mb-4" value={newRecipe.category} onChange={e => setNewRecipe({...newRecipe, category: e.target.value})}>
                            {categories.filter(c => c !== 'Hepsi').map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                        <textarea className="w-full border p-3 rounded-xl mb-4 h-32" placeholder="Malzemeler" value={newRecipe.ingredients} onChange={e => setNewRecipe({...newRecipe, ingredients: e.target.value})} />
                        <textarea className="w-full border p-3 rounded-xl mb-4 h-32" placeholder="Yapılış" value={newRecipe.instructions} onChange={e => setNewRecipe({...newRecipe, instructions: e.target.value})} />
                        <div className="flex gap-2">
                            <button onClick={saveRecipe} className="bg-orange-500 text-white flex-1 p-3 rounded-xl font-bold">Kaydet</button>
                            <button onClick={() => setIsAddingNew(false)} className="bg-slate-200 flex-1 p-3 rounded-xl font-bold">İptal</button>
                        </div>
                    </div>
                );
            }

            // ANA LİSTE
            return (
                <div className="max-w-4xl mx-auto p-4">
                    <div className="flex justify-between items-center mb-6">
                        <h1 className="text-2xl font-black text-slate-800">MUTFAK <span className="text-orange-500">NOTLARI</span></h1>
                        <button onClick={() => setIsAddingNew(true)} className="bg-orange-500 text-white w-12 h-12 rounded-full font-bold shadow-lg">＋</button>
                    </div>

                    <div className="mb-6">
                        <input className="w-full p-4 rounded-2xl bg-white shadow-sm outline-none focus:ring-2 ring-orange-200" placeholder="Tariflerde ara..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                    </div>

                    <div className="flex gap-2 overflow-x-auto pb-4 mb-4">
                        {categories.map(c => (
                            <button key={c} onClick={() => setSelectedCategory(c)} className={`px-4 py-2 rounded-full whitespace-nowrap font-bold text-sm ${selectedCategory === c ? 'bg-slate-800 text-white' : 'bg-white text-slate-500 border'}`}>{c}</button>
                        ))}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {filteredRecipes.map(r => (
                            <div key={r.id} onClick={() => setViewingRecipe(r)} className="recipe-card bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                <span className="text-[10px] font-bold text-orange-500 bg-orange-50 px-2 py-1 rounded uppercase tracking-widest">{r.category}</span>
                                <h3 className="text-xl font-bold mt-2 mb-4">{r.title}</h3>
                                <div className="flex justify-between items-center text-slate-400 text-sm font-bold">
                                    <span><SimpleIcon type="clock" /> {r.prepTime}</span>
                                    <span className="text-orange-500">İncele →</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
