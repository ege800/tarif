<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lezzet Defterim - Online Tarifler</title>
    <!-- React Kütüphaneleri -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (Tarayıcıda JSX çalıştırmak için) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        // Lucide ikonlarını React ile kullanabilmek için basit bir yardımcı
        const Icon = ({ name, size = 20, className = "", fill = "none" }) => {
            const [svg, setSvg] = React.useState("");
            
            React.useEffect(() => {
                // Lucide kütüphanesinden ikonu oluştur
                if (window.lucide) {
                    const iconNode = window.lucide.icons[name];
                    if (iconNode) {
                        const svgString = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="${fill}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-${name} ${className}">${iconNode.map(i => `<${i[0]} ${Object.entries(i[1]).map(([k,v]) => `${k}="${v}"`).join(' ')} />`).join('')}</svg>`;
                        setSvg(svgString);
                    }
                }
            }, [name, size, className, fill]);

            return <span dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        const App = () => {
            const [recipes, setRecipes] = React.useState([
                {
                    id: 1,
                    title: 'Pesto Soslu Tavuklu Makarna',
                    category: 'Ana Yemekler',
                    ingredients: 'Penne makarna, Tavuk göğsü, Krema, Pesto sosu, Zeytinyağı',
                    instructions: '1. Makarnayı tuzlu suda haşlayın.\n2. Tavukları küp küp doğrayıp zeytinyağında soteleyin.\n3. Krema ve pesto sosu ekleyip 2 dakika pişirin.\n4. Haşlanan makarnaları sosla birleştirip sıcak servis yapın.',
                    prepTime: '20 dk',
                    isFavorite: true,
                    file: null
                }
            ]);

            const categories = ['Hepsi', 'Ana Yemekler', 'Tatlılar', 'Kahvaltılıklar', 'Salatalar', 'Çorbalar'];
            const [searchTerm, setSearchTerm] = React.useState('');
            const [selectedCategory, setSelectedCategory] = React.useState('Hepsi');
            const [isAddingNew, setIsAddingNew] = React.useState(false);
            const [viewingRecipe, setViewingRecipe] = React.useState(null);
            const [activeTab, setActiveTab] = React.useState('explore');

            const [newRecipe, setNewRecipe] = React.useState({
                title: '',
                category: 'Ana Yemekler',
                ingredients: '',
                instructions: '',
                prepTime: '',
                isFavorite: false,
                file: null
            });

            const filteredRecipes = React.useMemo(() => {
                return recipes.filter(recipe => {
                    const matchesSearch = recipe.title.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesCategory = selectedCategory === 'Hepsi' || recipe.category === selectedCategory;
                    const matchesTab = activeTab === 'explore' || recipe.isFavorite;
                    return matchesSearch && matchesCategory && matchesTab;
                });
            }, [recipes, searchTerm, selectedCategory, activeTab]);

            const handleSaveRecipe = (e) => {
                e.preventDefault();
                if (!newRecipe.title) return;
                setRecipes([{ ...newRecipe, id: Date.now() }, ...recipes]);
                setNewRecipe({ title: '', category: 'Ana Yemekler', ingredients: '', instructions: '', prepTime: '', isFavorite: false, file: null });
                setIsAddingNew(false);
            };

            const toggleFavorite = (id, e) => {
                if (e) e.stopPropagation();
                setRecipes(recipes.map(r => r.id === id ? { ...r, isFavorite: !r.isFavorite } : r));
                if (viewingRecipe && viewingRecipe.id === id) {
                    setViewingRecipe(prev => ({...prev, isFavorite: !prev.isFavorite}));
                }
            };

            const deleteRecipe = (id, e) => {
                if (e) e.stopPropagation();
                setRecipes(recipes.filter(r => r.id !== id));
                if (viewingRecipe && viewingRecipe.id === id) setViewingRecipe(null);
            };

            if (viewingRecipe) {
                return (
                    <div className="min-h-screen bg-white">
                        <header className="border-b px-4 py-4 flex items-center justify-between sticky top-0 bg-white z-20">
                            <button onClick={() => setViewingRecipe(null)} className="p-2 hover:bg-slate-100 rounded-full flex items-center gap-2">
                                <Icon name="arrow-left" size={24} />
                                <span className="font-semibold text-slate-600">Geri</span>
                            </button>
                            <div className="flex items-center gap-3">
                                <button onClick={() => toggleFavorite(viewingRecipe.id)} className={`p-2 rounded-full border ${viewingRecipe.isFavorite ? 'text-pink-500 bg-pink-50' : 'text-slate-400'}`}>
                                    <Icon name="heart" fill={viewingRecipe.isFavorite ? "currentColor" : "none"} />
                                </button>
                                <button onClick={() => deleteRecipe(viewingRecipe.id)} className="p-2 text-slate-400 hover:text-red-500">
                                    <Icon name="trash-2" />
                                </button>
                            </div>
                        </header>
                        <main className="max-w-3xl mx-auto p-6 space-y-8">
                            <span className="text-xs font-bold text-orange-500 bg-orange-50 px-3 py-1 rounded-full uppercase tracking-widest">{viewingRecipe.category}</span>
                            <h1 className="text-4xl font-black">{viewingRecipe.title}</h1>
                            <div className="flex gap-4 text-slate-500 border-y py-4">
                                <div className="flex items-center gap-2"><Icon name="clock" className="text-orange-400" /> {viewingRecipe.prepTime}</div>
                            </div>
                            <div className="space-y-6">
                                <section>
                                    <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><Icon name="utensils" /> Malzemeler</h2>
                                    <div className="bg-slate-50 p-6 rounded-2xl whitespace-pre-wrap leading-loose">{viewingRecipe.ingredients}</div>
                                </section>
                                <section>
                                    <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><Icon name="book-open" /> Hazırlanış</h2>
                                    <p className="text-slate-700 leading-relaxed whitespace-pre-wrap">{viewingRecipe.instructions}</p>
                                </section>
                            </div>
                        </main>
                    </div>
                );
            }

            if (isAddingNew) {
                return (
                    <div className="min-h-screen bg-white">
                        <header className="border-b px-4 py-4 flex items-center justify-between sticky top-0 bg-white z-20">
                            <button onClick={() => setIsAddingNew(false)} className="p-2 hover:bg-slate-100 rounded-full"><Icon name="arrow-left" /></button>
                            <button onClick={handleSaveRecipe} className="bg-orange-500 text-white px-6 py-2 rounded-full font-bold">Kaydet</button>
                        </header>
                        <main className="max-w-3xl mx-auto p-6 space-y-6">
                            <input type="text" placeholder="Tarif Başlığı..." className="w-full text-3xl font-bold outline-none" value={newRecipe.title} onChange={e => setNewRecipe({...newRecipe, title: e.target.value})} />
                            <select className="w-full p-3 bg-slate-100 rounded-xl outline-none" value={newRecipe.category} onChange={e => setNewRecipe({...newRecipe, category: e.target.value})}>
                                {categories.filter(c => c !== 'Hepsi').map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                            <input type="text" placeholder="Süre (örn: 30 dk)" className="w-full p-3 bg-slate-100 rounded-xl outline-none" value={newRecipe.prepTime} onChange={e => setNewRecipe({...newRecipe, prepTime: e.target.value})} />
                            <textarea placeholder="Malzemeler..." className="w-full h-32 p-4 bg-slate-50 rounded-2xl outline-none" value={newRecipe.ingredients} onChange={e => setNewRecipe({...newRecipe, ingredients: e.target.value})} />
                            <textarea placeholder="Hazırlanışı..." className="w-full h-64 p-4 bg-slate-50 rounded-2xl outline-none" value={newRecipe.instructions} onChange={e => setNewRecipe({...newRecipe, instructions: e.target.value})} />
                        </main>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    <header className="bg-white border-b p-4 sticky top-0 z-10">
                        <div className="max-w-4xl mx-auto flex flex-col gap-4">
                            <div className="flex justify-between items-center">
                                <h1 className="text-xl font-black text-slate-800">MUTFAK<span className="text-orange-500">NOTLARI</span></h1>
                                <button onClick={() => setIsAddingNew(true)} className="bg-orange-500 text-white p-2 rounded-full shadow-lg"><Icon name="plus" size={28} /></button>
                            </div>
                            <div className="relative">
                                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="search" size={18} /></div>
                                <input type="text" placeholder="Tarif ara..." className="w-full bg-slate-100 py-3 pl-12 pr-4 rounded-2xl outline-none focus:bg-white border-2 border-transparent focus:border-orange-100" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            </div>
                            <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                                {categories.map(cat => (
                                    <button key={cat} onClick={() => setSelectedCategory(cat)} className={`px-4 py-2 rounded-xl text-sm font-bold whitespace-nowrap transition-all ${selectedCategory === cat ? 'bg-slate-900 text-white' : 'bg-white border text-slate-500'}`}>{cat}</button>
                                ))}
                            </div>
                        </div>
                    </header>
                    <main className="max-w-4xl mx-auto p-4">
                        <div className="flex bg-slate-200/50 p-1.5 rounded-2xl mb-6">
                            <button onClick={() => setActiveTab('explore')} className={`flex-1 py-2 rounded-xl font-bold ${activeTab === 'explore' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500'}`}>Tümü</button>
                            <button onClick={() => setActiveTab('favorites')} className={`flex-1 py-2 rounded-xl font-bold flex items-center justify-center gap-2 ${activeTab === 'favorites' ? 'bg-white text-pink-600 shadow-sm' : 'text-slate-500'}`}><Icon name="heart" size={16} fill={activeTab === 'favorites' ? "currentColor" : "none"} /> Favoriler</button>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {filteredRecipes.map(recipe => (
                                <div key={recipe.id} onClick={() => setViewingRecipe(recipe)} className="bg-white p-6 rounded-[2rem] border shadow-sm hover:shadow-md transition-all cursor-pointer group">
                                    <div className="flex justify-between mb-4">
                                        <span className="text-[10px] font-black uppercase text-orange-500 bg-orange-50 px-2 py-1 rounded">{recipe.category}</span>
                                        <button onClick={(e) => toggleFavorite(recipe.id, e)} className={`p-1 ${recipe.isFavorite ? 'text-pink-500' : 'text-slate-300'}`}><Icon name="heart" fill={recipe.isFavorite ? "currentColor" : "none"} /></button>
                                    </div>
                                    <h3 className="text-xl font-black mb-2 group-hover:text-orange-500">{recipe.title}</h3>
                                    <div className="flex items-center gap-2 text-slate-400 text-xs font-bold uppercase"><Icon name="clock" size={14} /> {recipe.prepTime}</div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
