<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lezzet Defterim</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}
.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
input,textarea,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
}
button{
background:#ff6600;
color:white;
border:none;
font-weight:bold;
cursor:pointer;
}
button:hover{
background:#e65c00;
}
.card{
background:#fff8f2;
padding:15px;
margin-top:15px;
border-radius:12px;
border-left:5px solid orange;
}
</style>
</head>
<body>

<div class="container">
<h1>🍽️ Lezzet Defterim</h1>

<input type="text" id="title" placeholder="Yemek Adı">
<input type="text" id="category" placeholder="Kategori">
<input type="text" id="time" placeholder="Hazırlık Süresi">
<textarea id="ingredients" placeholder="Malzemeler"></textarea>
<textarea id="instructions" placeholder="Tarif"></textarea>

<button onclick="ekle()">Tarif Ekle</button>

<div id="liste"></div>
</div>

<script>
const firebaseConfig = {
apiKey: "BURAYA_APIKEY",
authDomain: "BURAYA_AUTHDOMAIN",
projectId: "BURAYA_PROJECTID",
storageBucket: "BURAYA_STORAGE",
messagingSenderId: "BURAYA_SENDERID",
appId: "BURAYA_APPID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function ekle(){
const title = document.getElementById("title").value;
const category = document.getElementById("category").value;
const time = document.getElementById("time").value;
const ingredients = document.getElementById("ingredients").value;
const instructions = document.getElementById("instructions").value;

db.collection("recipes").add({
title,
category,
time,
ingredients,
instructions,
createdAt:new Date()
});

document.getElementById("title").value="";
document.getElementById("category").value="";
document.getElementById("time").value="";
document.getElementById("ingredients").value="";
document.getElementById("instructions").value="";
}

db.collection("recipes").orderBy("createdAt","desc")
.onSnapshot((snapshot)=>{
let html="";
snapshot.forEach((doc)=>{
const r = doc.data();

html += `
<div class="card">
<h2>${r.title}</h2>
<p><b>Kategori:</b> ${r.category}</p>
<p><b>Süre:</b> ${r.time}</p>
<p><b>Malzemeler:</b><br>${r.ingredients}</p>
<p><b>Tarif:</b><br>${r.instructions}</p>
</div>
`;
});

document.getElementById("liste").innerHTML = html;
});
</script>

</body>
</html>
